<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WhatsApp Web Scheduler</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; width: 350px; padding: 15px; margin: 0; }
    h2 { margin-top: 0; font-size: 1.2rem; }
    .form-group { margin-bottom: 12px; }
    label { display: block; margin-bottom: 4px; font-weight: 500; font-size: 0.9rem; }
    input, select, textarea { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
    textarea { resize: vertical; min-height: 60px; }
    button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: 600; font-size: 0.9rem; }
    .btn-primary { background-color: #25D366; color: white; width: 100%; margin-top: 5px; }
    .btn-primary:hover { background-color: #1ebd5a; }
    .btn-capture { background-color: #128C7E; color: white; font-size: 0.8rem; margin-top: 4px; display: inline-block; width: auto; }
    .list-section { margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; }
    .schedule-item { border: 1px solid #ddd; border-radius: 6px; padding: 10px; margin-bottom: 10px; font-size: 0.85rem; }
    .schedule-header { font-weight: bold; margin-bottom: 5px; display: flex; justify-content: space-between; }
    .status-badge { padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; text-transform: uppercase; }
    .status-pending { background-color: #fff3cd; color: #856404; }
    .status-sent { background-color: #d4edda; color: #155724; }
    .status-failed { background-color: #f8d7da; color: #721c24; }
    .delete-btn { color: red; background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; }
    .error-msg { color: #d9534f; margin-top: 5px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h2>Schedule Message</h2>

  <div class="form-group">
    <label for="target">Target Name / Number</label>
    <input type="text" id="target" placeholder="e.g. John Doe or +123456789" required>
    <button type="button" id="btn-capture" class="btn-capture">Capture Open Chat</button>
  </div>

  <div class="form-group" style="display:none;">
    <label for="targetType">Type</label>
    <select id="targetType">
      <option value="name">Chat Name</option>
      <option value="phone">Phone Number</option>
    </select>
  </div>

  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" placeholder="Type your message here..." required></textarea>
  </div>

  <div class="form-group">
    <label for="time">Local Time</label>
    <input type="datetime-local" id="time" required>
  </div>

  <div class="form-group">
    <label for="recurring">Recurring</label>
    <select id="recurring">
      <option value="none">One-time</option>
      <option value="daily">Daily</option>
      <option value="weekly">Weekly</option>
      <option value="monthly">Monthly</option>
    </select>
  </div>

  <button type="button" id="btn-save" class="btn-primary">Schedule</button>
  <div id="form-error" class="error-msg"></div>

  <div class="list-section">
    <h2>My Schedules</h2>
    <div id="schedule-list"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
